name: Continuous Integration

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./SupplyGraph/Frontend

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: './SupplyGraph/Frontend/package-lock.json'
    - name: Install dependencies
      run: npm ci
    - name: Run tests
      run: CI=true npm run test

  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./SupplyGraph/Backend
    
    env:
      MONGO_URI: ${{ secrets.MONGO_URI }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      CLIENT_ID: ${{ secrets.CLIENT_ID }}
      CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
      SESSION_SECRET: ${{ secrets.SESSION_SECRET }}

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: './SupplyGraph/Backend/package-lock.json'
    - name: Install dependencies
      run: npm install
    - name: Run tests
      run: npm run test

  test-ml-service:
    name: ML Service Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./SupplyGraph/Backend/ml-service

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt -r requirements-dev.txt
    - name: Run Pytest
      run: pytest
