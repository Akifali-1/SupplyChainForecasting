name: Continuous Integration

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./SupplyGraph/Frontend

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './SupplyGraph/Frontend/package-lock.json'
    - name: Install dependencies
      run: npm install --legacy-peer-deps
    - name: Run tests
      run: CI=true npm run test

  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017

    defaults:
      run:
        working-directory: ./SupplyGraph/Backend
    
    env:
      MONGO_URI: mongodb://localhost:27017/testdb
      JWT_SECRET: dummy_jwt_secret_for_testing
      GOOGLE_CLIENT_ID: dummy_google_client_id_for_testing
      GOOGLE_CLIENT_SECRET: dummy_google_client_secret_for_testing
      SESSION_SECRET: dummy_session_secret_for_testing

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './SupplyGraph/Backend/package-lock.json'
    - name: Install dependencies
      run: npm install --legacy-peer-deps
    - name: Run tests
      run: npm run test

  test-ml-service:
    name: ML Service Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./SupplyGraph/Backend/ml-service

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt -r requirements-dev.txt
    - name: Run Pytest
      env:
        PYTHONPATH: .
      run: python -m pytest
